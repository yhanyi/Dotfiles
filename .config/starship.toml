format = """$directory$git_branch$git_status$character"""
palette = "catppuccin"

[os]
style = "fg:text"
disabled = false

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "пҢӘ"

[username]
show_always = true
style_user = "fg:text"
style_root = "fg:text"
format = '[ $user ]($style)'

[directory]
style = "fg:text fg:teal"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[git_branch]
style = "fg:text fg:orange"
symbol = "пҗҳ"
format = '[$symbol$branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:text fg:red"
format = '[($all_status$ahead_behind) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'
disabled = true

[c]
symbol = "оҳһ "
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'
disabled = true

[rust]
symbol = "оһЁ"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'
disabled = true

[golang]
symbol = "оҳ§"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'
disabled = true

[java]
symbol = "оү– "
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'
disabled = true

[python]
symbol = "оҳҶ"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:base bg:teal)]($style)'
disabled = true

[docker_context]
symbol = "пҢҲ"
style = "bg:mantle"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'
disabled = true

[line_break]
disabled = false

[character]
success_symbol = '[пҗІ](bold fg:green)'
error_symbol = '[пҗІ](bold fg:red)'
vimcmd_symbol = '[пҗҙ](bold fg:creen)'
vimcmd_replace_one_symbol = '[пҗҙ](bold fg:purple)'
vimcmd_replace_symbol = '[пҗҙ](bold fg:purple)'
vimcmd_visual_symbol = '[пҗҙ](bold fg:lavender)'
disabled = false

